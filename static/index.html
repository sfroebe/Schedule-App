<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Group Schedule Viewer</title>

  <!-- FullCalendar CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    #controls {
      text-align: center;
      margin-bottom: 20px;
    }

    #userToggles {
      text-align: center;
      margin-bottom: 20px;
    }

    #calendar {
      max-width: 1000px;
      margin: 0 auto;
    }
  </style>
</head>

<body>

<h1>Group Schedule Viewer</h1>

<div id="controls">
  <input type="text" id="usernameInput" placeholder="Your name">
  <input type="file" id="csvFile" accept=".csv">
  <button id="uploadBtn">Upload CSV</button>
  <button id="resetBtn">Reset</button>
</div>

<div id="userToggles"></div>
<div id="calendar"></div>

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
  let calendar;
  let activeUsers = new Set();  // IDs of users whose events are visible
  let userList = [];            // [{user_id, username}]

  const SEMESTER_START = "2026-01-19"; // Monday
  const DAY_INDEX = {
    Sunday: 0,
    Monday: 1,
    Tuesday: 2,
    Wednesday: 3,
    Thursday: 4,
    Friday: 5,
    Saturday: 6
  };

  document.addEventListener("DOMContentLoaded", async function () {
    const calendarEl = document.getElementById("calendar");

    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: "timeGridWeek",
      initialDate: SEMESTER_START,
      allDaySlot: false,
      slotMinTime: "08:00:00",
      slotMaxTime: "20:00:00",
      height: "auto",

      headerToolbar: {
        left: "prev,next",
        center: "title",
        right: ""
      },

      datesSet: fetchCalendar
    });

    calendar.render();

    document.getElementById("uploadBtn").addEventListener("click", uploadCSV);
    document.getElementById("resetBtn").addEventListener("click", resetSchedules);

    await loadUsers();
    fetchCalendar();
  });

  function minutesToISO(dateStr, minutes) {
    const hours = Math.floor(minutes / 60);
    const mins = minutes % 60;
    return `${dateStr}T${hours.toString().padStart(2,"0")}:${mins.toString().padStart(2,"0")}:00`;
  }

  async function uploadCSV() {
    const fileInput = document.getElementById("csvFile");
    const usernameInput = document.getElementById("usernameInput");
    const username = usernameInput.value || `User ${Date.now()}`;

    if (!fileInput.files.length) {
      alert("Please select a CSV file.");
      return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("username", username);

    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    // Track new user
    const userObj = { 
      user_id: Number(data.user_id), 
      username: data.username 
    };

    userList.push(userObj);
    activeUsers.add(userObj.user_id);

    renderUserToggles();
    fetchCalendar();
  }

  function renderUserToggles() {
    const container = document.getElementById("userToggles");
    container.innerHTML = "";

    userList.forEach(user => {
      const label = document.createElement("label");
      label.style.marginRight = "10px";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = activeUsers.has(user.user_id);
      checkbox.onchange = () => {
        const id = Number(user.user_id);
        if (checkbox.checked) {
          activeUsers.add(id);
        } else {
          activeUsers.delete(id);
        }
        fetchCalendar();
      };

      label.appendChild(checkbox);
      label.appendChild(document.createTextNode(` ${user.username}`));
      container.appendChild(label);
    });
  }

  async function loadUsers() {
    const res = await fetch("/users");
    const users = await res.json();

    userList = [];
    activeUsers.clear();

    users.forEach(u => {
      const id = Number(u.user_id);
      userList.push({ user_id: id, username: u.username });
      activeUsers.add(id); // default: all users visible
    });

    renderUserToggles();
  }

  async function fetchCalendar() {
    const res = await fetch("/calendar");
    const data = await res.json();

    calendar.removeAllEvents();
    if (data.message) return;

    // Sync userList with backend user IDs in calendar data
    const seenUserIds = new Set(userList.map(u => u.user_id));
    Object.values(data.busy).flat().forEach(([start, end, count, user_id]) => {
      if (!seenUserIds.has(user_id)) {
        userList.push({ user_id, username: `User ${user_id}` }); // placeholder name if needed
        activeUsers.add(user_id);
        seenUserIds.add(user_id);
      }
    });

    renderUserToggles();

    const weekStart = calendar.view.currentStart;

    for (const [day, events] of Object.entries(data.busy)) {
      events.forEach(([start, end, count, user_id]) => {
        user_id = Number(user_id);

        if (!activeUsers.has(user_id)) return;

        calendar.addEvent({
          title: `Busy (${count})`,
          start: minutesToISO(getDateForWeekday(weekStart, day), start),
          end: minutesToISO(getDateForWeekday(weekStart, day), end),
          backgroundColor: overlapColor(count),
          borderColor: overlapColor(count)
        });
      });
    }
  }

  async function resetSchedules() {
    await fetch("/reset", { method: "POST" });
    calendar.removeAllEvents();
    userList = [];
    activeUsers.clear();
    renderUserToggles();
  }

  function getDateForWeekday(weekStart, weekday) {
    const date = new Date(weekStart); // weekStart from FullCalendar
    const currentDayIndex = date.getDay();
    const targetDayIndex = DAY_INDEX[weekday];
    let diff = targetDayIndex - currentDayIndex;
    // Adjust for negative difference to wrap into the week
    if (diff < 0) diff += 7;
    date.setDate(date.getDate() + diff);
    return date.toISOString().split("T")[0];
  }

  function overlapColor(count) {
    const capped = Math.min(count, 5);
    const factor = 1 - (capped - 1) * 0.15;
    return `rgb(${Math.floor(255 * factor)}, ${Math.floor(77 * factor)}, ${Math.floor(77 * factor)})`;
  }
</script>

</body>
</html>
